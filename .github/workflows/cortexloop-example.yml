# Example: gate a PR after your AI tool produces docs/cortexloop/report.json
#
# Step 1 (required): invoke your AI tool so report.json is produced by CodeCortexLoop
# The committed report MUST include "generatedBy": "cortexloop" or ci-gate will reject it.
#
# - name: Run CodeCortexLoop analysis
#   run: |
#     # cursor / claude / your-tool --command "/cortexloop-pre-pr --ci"
#     test -f docs/cortexloop/report.json

name: CodeCortexLoop

on:
  pull_request:
    branches: [main, master]

jobs:
  cortexloop-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Replace this block with your AI CLI invocation that writes report.json
      # - name: Run CodeCortexLoop analysis
      #   run: |
      #     # cursor / claude / your-tool --command "/cortexloop-pre-pr --ci"
      #     test -f docs/cortexloop/report.json

      - name: CodeCortexLoop gate (badge + dashboard + PR comment)
        uses: ./
        with:
          report-path: docs/cortexloop/report.json
          max-high: '0'
          baseline: 'false'
          comment: 'true'
          upload-sarif: 'false'

      - name: Upload CodeCortexLoop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortexloop-report
          path: |
            docs/cortexloop/
            .cortexloop/
